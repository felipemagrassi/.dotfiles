include:
- "**/*.rb"
exclude:
- spec/**/*
- test/**/*
- vendor/**/*
- ".bundle/**/*"
require: []
domains: []
reporters:
  - rubocop
  - require_not_found
  - typecheck
require_paths: []
formatter:
  rubocop:
    cops: safe
    except: []
    only: []
    extra_args: []
plugins: 
  - solargraph_rails
max_files: 10000
